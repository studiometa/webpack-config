name: Release

on:
  push:
    tags:
      - '*.*.*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Determine npm tag and release type
        run: |
          VERSION=${GITHUB_REF_NAME}
          NPM_TAG='latest'
          IS_PRERELEASE=false

          if [[ $VERSION =~ (alpha|beta|rc) ]]; then
            NPM_TAG='next'
            IS_PRERELEASE=true
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "NPM_TAG=$NPM_TAG" >> $GITHUB_ENV
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_ENV

      - name: Publish packages
        run: |
          npm publish --provenance --access public --tag ${{ env.NPM_TAG }} \
            --workspace @studiometa/webpack-config \
            --workspace @studiometa/webpack-config-preset-markdown \
            --workspace @studiometa/webpack-config-preset-polyfills \
            --workspace @studiometa/webpack-config-preset-prototyping \
            --workspace @studiometa/webpack-config-preset-tailwindcss-4 \
            --workspace @studiometa/webpack-config-preset-vue-2 \
            --workspace @studiometa/webpack-config-preset-vue-3
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Please refer to [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for details.
          draft: false
          prerelease: ${{ env.IS_PRERELEASE }}
